version: '3.8'

services:
  # 开发环境 — 挂载源码, 支持热更新和交互式调试
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - .:/app
      - ./evidence:/app/evidence
      - ./states:/app/states
    environment:
      - API_GATEWAY_KEY=${API_GATEWAY_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-claude-opus-4-5-20251101}
      - BROWSER_HEADLESS=true
      - DOCKER_CONTAINER=1
    stdin_open: true
    tty: true
    mem_limit: 4g
    cpus: 2.0

  # 生产环境 — 代码打包进镜像, 独立运行
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    volumes:
      - ./evidence:/app/evidence
      - ./states:/app/states
    environment:
      - API_GATEWAY_KEY=${API_GATEWAY_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-claude-opus-4-5-20251101}
      - BROWSER_HEADLESS=true
      - DOCKER_CONTAINER=1
    mem_limit: 4g
    cpus: 2.0
    restart: unless-stopped
